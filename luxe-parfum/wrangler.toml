name = "luxe-parfum"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ─── Secrets: set via Cloudflare Dashboard or CLI ───
# Run once per environment:
#
#   npx wrangler pages secret put ADMIN_PASS
#   npx wrangler pages secret put CLOUDINARY_CLOUD
#   npx wrangler pages secret put CLOUDINARY_PRESET
#   npx wrangler pages secret put GIST_ID
#   npx wrangler pages secret put GITHUB_TOKEN
#
# NEVER put actual values in this file!
