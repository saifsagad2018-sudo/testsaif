# ============================================================
# wrangler.toml — Cloudflare Pages configuration
# ============================================================

name = "luxury-perfume-store"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Build settings
[build]
command = "npm run build"
cwd = "."

[build.upload]
format = "directory"
dir = ".vercel/output/static"

# For Cloudflare Pages with Next.js, use @cloudflare/next-on-pages:
# npm install -D @cloudflare/next-on-pages
# Then update build command to: npx @cloudflare/next-on-pages

# ── Environment Variables ────────────────────────────────────
# Set these in Cloudflare Dashboard > Pages > Settings > Environment Variables
# DO NOT put real values here — this file is committed to version control

# [vars]
# NEXT_PUBLIC_CF_PAGES = "1"

# Secrets (set via CLI or Dashboard — never in wrangler.toml):
# wrangler secret put ADMIN_PASS
# wrangler secret put GIST_ID
# wrangler secret put GITHUB_TOKEN
