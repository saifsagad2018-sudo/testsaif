name = "maison-lumiere"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-sensitive vars only. Secrets go in Cloudflare Dashboard > Settings > Variables
APP_ENV = "production"

# KV Namespace for edge config caching
[[kv_namespaces]]
binding = "CONFIG_CACHE"
id = "your_kv_namespace_id_here"

# For Pages deployment:
# [env.production]
# routes = [{ pattern = "maisonlumiere.com/*", zone_id = "your_zone_id" }]
